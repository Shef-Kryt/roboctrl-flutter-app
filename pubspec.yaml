name: duplomna2
description: "Додаток для керуванння робомобілем"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_joystick: ^0.0.4
  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.0.3
  fl_chart: ^0.66.2
  permission_handler: ^11.3.0
  android_intent_plus: ^4.0.3
  path_provider: ^2.1.2
  logger: ^2.0.2+1
  flutter_blue_plus: ^1.31.15
  flutter_bluetooth_classic_serial:
    path: packages/flutter_bluetooth_classic_serial
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
